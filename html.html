<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fa;
}

.sidebar{
height:100vh;
background:#003B70;
color:white;
position:fixed;
width:240px;
padding:20px;
}

.sidebar h3{
margin-bottom:30px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
}

.content{
margin-left:260px;
padding:20px;
}

.card-kpi{
border:none;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.valor{
font-size:28px;
font-weight:bold;
}

.hidden{
display:none;
}

.ganador{
background:#d4edda !important;
font-weight:bold;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>📊 Cotizador Pro</h3>

<button class="btn btn-light" onclick="mostrar('dashboard')">Dashboard</button>

<button class="btn btn-light" onclick="mostrar('cotizaciones')">Cotizaciones</button>

<button class="btn btn-light" onclick="mostrar('proveedores')">Proveedores</button>

<button class="btn btn-light" onclick="mostrar('aprobaciones')">Aprobaciones</button>

<button class="btn btn-success" onclick="exportarExcel()">Exportar Excel</button>

</div>

<div class="content">

<!-- DASHBOARD -->

<div id="dashboard">

<div class="row g-3">

<div class="col-md-3">
<div class="card card-kpi p-3">
<h6>Total Cotizaciones</h6>
<div class="valor" id="kpiCot">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-kpi p-3">
<h6>Total Comprado</h6>
<div class="valor" id="kpiMonto">S/0</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-kpi p-3">
<h6>Aprobadas</h6>
<div class="valor" id="kpiAprobadas">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card card-kpi p-3">
<h6>Proveedores</h6>
<div class="valor" id="kpiProv">0</div>
</div>
</div>

</div>

</div>

<!-- COTIZACIONES -->

<div id="cotizaciones" class="hidden">

<h3>Nueva Cotización</h3>

<div class="row">

<div class="col-md-2">
<input id="rq" class="form-control" placeholder="RQ">
</div>

<div class="col-md-4">
<input id="descripcion" class="form-control" placeholder="Descripción">
</div>

<div class="col-md-1">
<input id="cantidad" type="number" class="form-control" placeholder="Cant">
</div>

<div class="col-md-2">
<select id="proveedor" class="form-control"></select>
</div>

<div class="col-md-2">
<input id="precio" type="number" class="form-control" placeholder="Precio">
</div>

<div class="col-md-1">
<button class="btn btn-primary" onclick="guardarCotizacion()">+</button>
</div>

</div>

<hr>

<table class="table table-striped">

<thead>

<tr>
<th>ID</th>
<th>RQ</th>
<th>Descripción</th>
<th>Proveedor</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
<th>Estado</th>
</tr>

</thead>

<tbody id="tablaCot"></tbody>

</table>

</div>

<!-- PROVEEDORES -->

<div id="proveedores" class="hidden">

<h3>Proveedores</h3>

<div class="row">

<div class="col-md-4">
<input id="nuevoProveedor" class="form-control" placeholder="Proveedor">
</div>

<div class="col-md-2">
<button class="btn btn-success" onclick="guardarProveedor()">
Agregar
</button>
</div>

</div>

<hr>

<ul id="listaProveedores" class="list-group"></ul>

</div>

<!-- APROBACIONES -->

<div id="aprobaciones" class="hidden">

<h3>Aprobaciones</h3>

<table class="table">

<thead>

<tr>
<th>ID</th>
<th>Descripción</th>
<th>Total</th>
<th>Estado</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tablaAprobaciones"></tbody>

</table>

</div>

</div>

<script>

let proveedores =
JSON.parse(localStorage.getItem("proveedores")) || [];

let cotizaciones =
JSON.parse(localStorage.getItem("cotizaciones")) || [];

function mostrar(id){

["dashboard","cotizaciones","proveedores","aprobaciones"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");

}

function guardarProveedor(){

let nombre =
document.getElementById("nuevoProveedor").value;

if(!nombre) return;

proveedores.push(nombre);

localStorage.setItem(
"proveedores",
JSON.stringify(proveedores)
);

renderProveedores();

}

function renderProveedores(){

let lista =
document.getElementById("listaProveedores");

let combo =
document.getElementById("proveedor");

lista.innerHTML="";
combo.innerHTML="";

proveedores.forEach(p=>{

lista.innerHTML +=
`<li class="list-group-item">${p}</li>`;

combo.innerHTML +=
`<option>${p}</option>`;

});

atualizarKPIs();

}

function guardarCotizacion(){

let cot = {

id: Date.now(),

rq: rq.value,

descripcion: descripcion.value,

cantidad: Number(cantidad.value),

proveedor: proveedor.value,

precio: Number(precio.value),

estado:"Pendiente"

};

cot.total = cot.cantidad * cot.precio;

cotizaciones.push(cot);

localStorage.setItem(
"cotizaciones",
JSON.stringify(cotizaciones)
);

renderCotizaciones();

}

function renderCotizaciones(){

let tabla =
document.getElementById("tablaCot");

tabla.innerHTML="";

cotizaciones.forEach(c=>{

tabla.innerHTML += `

<tr>

<td>${c.id}</td>
<td>${c.rq}</td>
<td>${c.descripcion}</td>
<td>${c.proveedor}</td>
<td>${c.cantidad}</td>
<td>S/${c.precio}</td>
<td>S/${c.total}</td>
<td>${c.estado}</td>

</tr>

`;

});

renderAprobaciones();
atualizarKPIs();

}

function renderAprobaciones(){

let tabla =
document.getElementById("tablaAprobaciones");

tabla.innerHTML="";

cotizaciones.forEach(c=>{

tabla.innerHTML += `

<tr>

<td>${c.id}</td>
<td>${c.descripcion}</td>
<td>S/${c.total}</td>
<td>${c.estado}</td>

<td>

<button
class="btn btn-success btn-sm"
onclick="aprobar(${c.id})">

Aprobar

</button>

<button
class="btn btn-danger btn-sm"
onclick="rechazar(${c.id})">

Rechazar

</button>

</td>

</tr>

`;

});

}

function aprobar(id){

let c = cotizaciones.find(x=>x.id==id);

c.estado="Aprobado";

guardar();

}

function rechazar(id){

let c = cotizaciones.find(x=>x.id==id);

c.estado="Rechazado";

guardar();

}

function guardar(){

localStorage.setItem(
"cotizaciones",
JSON.stringify(cotizaciones)
);

renderCotizaciones();

}

function atualizarKPIs(){

document.getElementById("kpiCot").innerText =
cotizaciones.length;

let total =
cotizaciones.reduce((a,b)=>a+b.total,0);

document.getElementById("kpiMonto").innerText =
"S/"+total.toFixed(2);

document.getElementById("kpiAprobadas").innerText =
cotizaciones.filter(x=>x.estado=="Aprobado").length;

document.getElementById("kpiProv").innerText =
proveedores.length;

}

function exportarExcel(){

let csv =
"ID,RQ,Descripcion,Proveedor,Cantidad,Precio,Total,Estado\n";

cotizaciones.forEach(c=>{

csv +=
`${c.id},${c.rq},${c.descripcion},${c.proveedor},${c.cantidad},${c.precio},${c.total},${c.estado}\n`;

});

let blob = new Blob([csv]);

let a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "Cotizaciones.csv";

a.click();

}

renderProveedores();
renderCotizaciones();

</script>

</body>
</html>
